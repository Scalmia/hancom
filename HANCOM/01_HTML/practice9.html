<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset ="UTF-8">
        <title>class/ID/div/span</title>
    </head>
    <body>
        <h1>class 연습</h1>
        <p class="fruit">사과</p>
        <p class="fruit">오렌지</p>
        <p class="fruit">바나나</p>
        <p class="fruit purple">포도</p>
        <h1>ID 연습</h1>
        <p id="apple">사과</p>
        <p id="orange">오렌지</p>
        <p id="banana">바나나</p>
        <h1>div 연습</h1>
        <div class="vagetable" style="font-size:30px; color:green">
            <p>양배추</p>
            <p>상추</p>
            <p>시금치</p>
        </div>
        <h1>span 연습</h1>
        <p>나는 <span style="font-size:20px; color:red">사과</span>를 좋아합니다.</p>
    </body>
</html>
