        <p>다른 태그 연습</p>
        <label for="browser-input">좋아하는 브라우저를 선택하거나 입력하세요:</label>
        <input type="text" id="browser-input" list="browsers" placeholder="브라우저 입력...">
        <datalist id="browsers">
            <option value="Chrome">
            <option value="Firefox">
            <option value="Safari">
            <option value="Edge">

        <dl>
        <dt>HTML</dt>
