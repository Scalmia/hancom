<!DOCTYPE html>                      <!-- "이건 HTML 문서야" 선언 -->
<html lang="ko">                     <!-- 문서 시작, 한국어 페이지 -->
  <head>                             <!-- 화면엔 안 보이는 준비 칸 -->
    <meta charset="UTF-8">           <!-- 한글 안 깨지게 -->
    <title>나의 첫 페이지</title>      <!-- 브라우저 탭에 뜨는 이름 -->
  </head>
  <body>                             <!-- 화면에 보이는 진짜 내용 칸 -->
    <h1>안녕하세요! 제 첫 웹페이지입니다.</h1>   <!-- 큰 제목 한 줄 -->
    <h2>222222222222222</h2>
    <h6>333333333333333</h6>
    <p>이건 문단입니다. 문단은 여러 줄로 구성될 수 있습니다.
        반가워요. 
        네 반갑습니다.
    </p>
    <a href="https://www.naver.com">네이버</a> <!-- 링크 -->
    <abbr title="Hyper Text Markup Language">이게 뭐지?</abbr> <!-- 약어 -->
    <address>서울시 강남구</address> <!-- 주소 -->
    <!-- <area shape="poly" coords="34,44,270,350" href="https://www.naver.com" alt="네이버"> 이미지맵 -->

    <h2>이미지맵 작동 테스트</h2>
    <p>아래 이미지에서 지정된 사각형 영역을 클릭하면 네이버로 이동합니다.</p>
    <!-- CSS로 배경색을 회색으로 칠해 이미지가 있는 것처럼 보이게 만듭니다 -->
    <img src="dummy" usemap="#test-map" width="400" height="400" 
        style="background-color: #ddd; display: block;" alt="가짜 이미지 배경">
    <!-- <img src="https://picsum.photos" alt="테스트 이미지" usemap="#naver-link-map" width="400" height="400"> -->
    <map name="naver-link-map">
        <!-- 3. 영역 태그: 사각형 좌표 범위를 클릭하면 네이버로 이동합니다. -->
        <area shape="rect" coords="34,44,270,350" href="https://naver.com" alt="네이버" target="_blank">
    </map>
    <article>
        <h2>기사 제목</h2>
        <p>기사 내용이 들어갑니다.</p>
    </article>
    <aside>
        <h2>사이드바 제목</h2>
        <p>사이드바 내용이 들어갑니다.</p>
    </aside>
    <h1><b>굵은 글씨</b></h1>
    <base href="https://www.naver.com"> <!-- 기준 URL -->
  </body>
</html>                             <!-- 문서 끝 -->
