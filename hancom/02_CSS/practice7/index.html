<!DOCTYPE html>
  <html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS 리셋</title>
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <h1>CSS 리셋</h1>
    <p>CSS 리셋은 브라우저마다 기본적으로 적용되는 스타일을 초기화하는 방법입니다.</p>
    <p>브라우저마다 기본적으로 적용되는 스타일이 다르기 때문에, CSS 리셋을 통해 일관된 스타일을 적용할 수 있습니다.</p>
    <p>CSS 리셋을 적용하지 않으면, 브라우저마다 다른 스타일이 적용되어 디자인이 깨질 수 있습니다.</p>
    <ul>
      <li>리스트 아이템 1</li>
      <li>리스트 아이템 2</li>
      <li>리스트 아이템 3</li>
    </ul>
    <button>버튼</button>
    <input type="text" placeholder="텍스트 입력" />
  </body>
  <div class="test-box">안녕하세요</div>
  </html>
