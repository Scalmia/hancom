<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>조립되는 자기소개</title>
  <link rel="stylesheet" href="./styles/main.css" />
  <script src="https://aframe.io/releases/1.8.0/aframe.min.js"></script>
</head>
<body>

  <a-scene id="scene">
      <a-entity camera wasd-controls position="0 1.6 1" rotation="20 0 0"> <!--look-control을 제거하니 rotation이 작동함 -->
      <a-entity cursor="rayOrigin: mouse"></a-entity>
    </a-entity>
    <a-sky material="src: ./images/sky-gradient.png; offset: 0 -0.1" animation="property: rotation; to: 360 0 0; loop: true; dur: 20000; easing: linear"></a-sky>

    <a-plane id="wall-left" position="-4 4 -5" rotation="0 60 0" width="4" height="8" material="src: ./images/sky-gradient.png"></a-plane>
    <a-plane id="wall-right" position="4 4 -5" rotation="0 -60 0" width="4" height="8" material="src: ./images/sky-gradient.png"></a-plane>

    <a-entity id="progress-board" position="0 6 -5" animation__bounce="property: scale; from: 1 1 1; to: 1.3 1.3 1.3; dir: alternate; loop: 2; dur: 150; easing: easeOutQuad; startEvents: bounce">
      <a-plane width="3" height="1" color="#000" opacity="0.75"></a-plane>
      <a-text id="progress-text" value="0 / 13 Assembled" align="center" color="#fff" font="exo2bold" letterSpacing="2" width="7.8" position="0 0 0.01"></a-text>
    </a-entity>
  </a-scene>

  <div id="info">큐브를 하나씩 클릭해서 조립해보세요</div>

  <script src="./scripts/main.js"></script>
</body>
</html>
