<!DOCTYPE html>
    <html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>loop/문자열 메서드/배열 메서드/객체</title>
        <link rel="stylesheet" href="./styles/main.css" />
    </head>
    <body>
        <h1>loop</h1>
        <input id="n" type="number" value="5"/>
        <button id="run">실행</button>
        <button id="countdown">카운트다운</button>
        <ul id="result"></ul>
        <h1>문자열 메서드</h1>
        <input id="text" type="text" value="Hello World"/>
        <button id="run2">분석</button>
        <p id="result2">글자를 넣고 분석을 누르세요.</p>
        <h1>배열 메서드</h1>
        <input id="fruit" type="text" placeholder="과일을 입력하세요" />
        <button id="add">추가</button>
        <p id="result3">과일을 입력하고 분석을 누르세요.</p>
        <p id="info"></p>
        <h1>객체</h1>
        <p id="result4"></p>
        <button id="up">나이 +1</button>
        <button id="rename">이름 바꾸기</button>
        <script src="./scripts/main.js"></script>
    </body>
</html>
