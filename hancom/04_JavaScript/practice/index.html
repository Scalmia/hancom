<!DOCTYPE html>
    <html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>hello world/greeting/자료형</title>
        <link rel="stylesheet" href="./styles/main.css" />
    </head>
    <body>
        <h1 id="title">hello world</h1>
        <div class="btn">change</div>
        <h1>인사</h1>
        <input id="nameInput" type="text" placeholder="이름을 입력하세요" />
        <button id="greetBtn">인사하기</button>
        <p id="out">이름을 넣고 버튼을 누르세요.</p>
        <section>
            <button id="strBtn">글자</button>
            <button id="numBtn">숫자</button>
            <button id="boolBtn">불린</button>
            <button id="nullBtn">널</button>
            <button id="undefBtn">언디파인드</button>
            <button id="arrBtn">배열</button>
            <button id="objBtn">객체</button>
        </section>
        <p id="out">버튼을 누르고 값을 확인하세요.</p>
        <script src="./scripts/main.js"></script>
    </body>
</html>
